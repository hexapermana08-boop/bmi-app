<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HealthSync | Kalkulator</title>
  <link rel="icon" type="image/webp" href="img/l1.webp">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="img/l1.webp" alt="Logo" class="logo-img">
    <span class="logo-text">HealthSync</span>
  </div>
  <button onclick="toggleTheme()" style="background: none; border: none; font-size: 24px; cursor: pointer;">🌙</button>
</div>

<div class="container">
  <div class="glass-card">
    <h2 style="margin-bottom: 20px;">Kalkulator BMI</h2>
    <p class="subtitle" style="margin-bottom: 20px; opacity:0.7;">Masukkan data dirimu</p>
    
    <div class="input-group">
      <input type="text" id="nama" placeholder="Nama Lengkap">
    </div>
    <div class="input-row">
      <div class="input-group"><input type="number" id="umur" placeholder="Umur (tahun)"></div>
      <div class="input-group">
        <select id="gender">
          <option value="" disabled selected>Gender</option>
          <option value="Laki-laki">👨 Laki-laki</option>
          <option value="Perempuan">👩 Perempuan</option>
        </select>
      </div>
    </div>
    <div class="input-row">
      <div class="input-group"><input type="number" id="tinggi" placeholder="Tinggi (cm)"></div>
      <div class="input-group"><input type="number" id="berat" placeholder="Berat (kg)"></div>
    </div>
    <div class="btn-group">
      <button onclick="hitungBMI()" class="btn btn-primary">⚡ Hitung BMI</button>
      <button onclick="simpanKeRiwayat()" class="btn btn-outline" id="btnSimpan" disabled>💾 Simpan</button>
    </div>
  </div>

  <div id="hasil" class="result-card" style="display: none;"></div>
</div>

<div class="bottom-nav">
  <a href="index.html" class="nav-item"><span>🏠</span><span>Home</span></a>
  <a href="kalkulator.html" class="nav-item active"><span>🧮</span><span>Kalkulator</span></a>
  <a href="riwayat.html" class="nav-item"><span>📊</span><span>Riwayat</span></a>
</div>

<script src="script.js"></script>
</body>
</html>
