<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>HealthSync | Kalkulator</title>
  <link rel="icon" type="image/webp" href="img/l1.webp">
  <link rel="stylesheet" href="style.css">
</head>
<body class="light">

<div class="status-bar"><span>9:41</span><span>📶 🔋</span></div>
<div class="user-section" id="userSection"></div>

<div class="main-content">
  <div class="hero">
    <img src="img/l1.webp" alt="Logo" class="hero-logo">
    <h1>Kalkulator BMI</h1>
    <p class="subtitle">Masukkan data dirimu</p>
  </div>

  <div class="glass-card">
    <div class="form-group"><input type="text" id="nama" placeholder="Nama Lengkap"></div>
    <div class="form-row">
      <div class="form-group"><input type="number" id="umur" placeholder="Umur (tahun)"></div>
      <div class="form-group">
        <select id="gender"><option value="" disabled selected>Pilih Gender</option><option value="Laki-laki">👨 Laki-laki</option><option value="Perempuan">👩 Perempuan</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><input type="number" id="tinggi" placeholder="Tinggi (cm)"></div>
      <div class="form-group"><input type="number" id="berat" placeholder="Berat (kg)"></div>
    </div>
    <div class="btn-group">
      <button onclick="hitungBMI()" class="btn btn-primary">⚡ Hitung BMI</button>
      <button onclick="simpanKeRiwayat()" class="btn btn-secondary" id="btnSimpan" disabled>💾 Simpan Data</button>
    </div>
  </div>

  <div id="hasil" class="hasil-card" style="display: none;"></div>
</div>
