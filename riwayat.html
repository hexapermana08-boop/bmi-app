<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HealthSync | Riwayat</title>
  <link rel="icon" type="image/webp" href="img/l1.webp">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="img/l1.webp" alt="Logo" class="logo-img">
    <span class="logo-text">HealthSync</span>
  </div>
  <button onclick="toggleTheme()" style="background: none; border: none; font-size: 24px; cursor: pointer;">🌙</button>
</div>

<div class="container">
  <div class="glass-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <h2>Riwayat BMI</h2>
      <button onclick="hapusSemua()" class="btn btn-outline" style="padding: 8px 16px;">🗑️ Hapus Semua</button>
    </div>
    <div id="jumlahData" style="margin-bottom: 16px; font-size: 13px; opacity:0.7;">0 data</div>
    
    <div id="emptyState" class="empty-state" style="display: none;">
      <span>📭</span>
      <p>Belum ada data riwayat</p>
      <small>Silakan hitung BMI di Kalkulator</small>
    </div>
    
    <ul id="listRiwayat" class="riwayat-list"></ul>
  </div>
</div>

<div class="bottom-nav">
  <a href="index.html" class="nav-item"><span>🏠</span><span>Home</span></a>
  <a href="kalkulator.html" class="nav-item"><span>🧮</span><span>Kalkulator</span></a>
  <a href="riwayat.html" class="nav-item active"><span>📊</span><span>Riwayat</span></a>
</div>

<script src="script.js"></script>
</body>
</html>
