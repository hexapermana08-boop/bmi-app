<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>HealthSync | Riwayat</title>
  <link rel="icon" type="image/webp" href="img/l1.webp">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="img/l1.webp" alt="Logo" class="logo-img">
    <span class="logo-text">HealthSync</span>
  </div>
  <button onclick="toggleTheme()" class="theme-btn" id="themeToggleBtn">🌙</button>
</div>

<div class="container">
  <div class="glass-card">
    <div class="history-header">
      <h2 style="font-size: 22px;">📜 Riwayat BMI</h2>
      <button onclick="hapusSemua()" class="btn btn-outline" style="padding: 8px 16px;">🗑️ Hapus Semua</button>
    </div>
    
    <div id="jumlahData" class="badge-count" style="display: inline-block; margin-bottom: 20px;">0 data</div>
    
    <div id="emptyState" class="empty-state" style="display: none;">
      <span>📭</span>
      <p style="margin-top: 12px;">Belum ada data riwayat</p>
      <small style="opacity: 0.6;">Silakan hitung BMI di halaman Kalkulator</small>
    </div>
    
    <ul id="listRiwayat" class="riwayat-list"></ul>
  </div>
</div>

</html>
